services:
  thiara:
    image: ${thiara_IMAGE}
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /srv/thiara/data:/app/Data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=DataSource=/app/Data/app.db;Cache=Shared
